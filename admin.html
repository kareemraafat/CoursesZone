<!DOCTYPE html>
<html>
<head>
    <title>Complete Admin Panel</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: #ddd; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #2563eb; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 10px; margin-top: 10px; }
        .tab-content.active { display: block; }
        input, textarea, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; border: none; cursor: pointer; border-radius: 5px; }
        .add-btn { background: #2563eb; color: white; }
        .edit-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #dc2626; color: white; }
        .cancel-btn { background: #6b7280; color: white; }
        .clear-btn { background: #dc2626; color: white; margin-bottom: 20px; }
        .item-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex: 1; }
        .actions { display: flex; gap: 10px; }
        .form-section { background: #f0f0f0; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>📚 Complete Admin Panel</h1>
    
    <div class="tabs">
        <div class="tab active" data-tab="courses">📖 Courses</div>
        <div class="tab" data-tab="instructors">👨‍🏫 Instructors</div>
        <div class="tab" data-tab="testimonials">⭐ Testimonials</div>
        <div class="tab" data-tab="branches">📍 Branches</div>
    </div>
    
    <button id="clearBtn" class="clear-btn">🗑️ Clear All Data</button>
    
    <!-- ==================== COURSES TAB ==================== -->
    <div id="courses-tab" class="tab-content active">
        <div class="form-section">
            <h2 id="coursesFormTitle">Add New Course</h2>
            <input type="hidden" id="courseId">
            <input type="text" id="course_title_en" placeholder="Title (English)">
            <input type="text" id="course_title_ar" placeholder="Title (Arabic)">
            <textarea id="course_description_en" placeholder="Description (English)" rows="2"></textarea>
            <textarea id="course_description_ar" placeholder="Description (Arabic)" rows="2"></textarea>
            <input type="number" id="course_price" placeholder="Price (USD)">
            <select id="course_level_en">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
            <select id="course_level_ar">
                <option value="مبتدئ">مبتدئ</option>
                <option value="متوسط">متوسط</option>
                <option value="متقدم">متقدم</option>
            </select>
            <input type="number" id="course_weeks" placeholder="Duration (weeks)">
            <input type="text" id="course_image" placeholder="Image URL">
            <button id="courseSubmitBtn" class="add-btn">➕ Add Course</button>
            <button id="courseCancelBtn" class="cancel-btn" style="display:none">Cancel</button>
        </div>
        <h2>📖 All Courses</h2>
        <div id="coursesList"></div>
    </div>
    
    <!-- ==================== INSTRUCTORS TAB ==================== -->
    <div id="instructors-tab" class="tab-content">
        <div class="form-section">
            <h2 id="instructorsFormTitle">Add New Instructor</h2>
            <input type="hidden" id="instructorId">
            <input type="text" id="instructor_name_en" placeholder="Name (English)">
            <input type="text" id="instructor_name_ar" placeholder="Name (Arabic)">
            <input type="text" id="instructor_title_en" placeholder="Title (English)">
            <input type="text" id="instructor_title_ar" placeholder="Title (Arabic)">
            <textarea id="instructor_bio_en" placeholder="Bio (English)" rows="2"></textarea>
            <textarea id="instructor_bio_ar" placeholder="Bio (Arabic)" rows="2"></textarea>
            <input type="text" id="instructor_image" placeholder="Image URL">
            <input type="text" id="instructor_facebook" placeholder="Facebook URL">
            <input type="text" id="instructor_instagram" placeholder="Instagram URL">
            <input type="text" id="instructor_tiktok" placeholder="TikTok URL">
            <button id="instructorSubmitBtn" class="add-btn">➕ Add Instructor</button>
            <button id="instructorCancelBtn" class="cancel-btn" style="display:none">Cancel</button>
        </div>
        <h2>👨‍🏫 All Instructors</h2>
        <div id="instructorsList"></div>
    </div>
    
    <!-- ==================== TESTIMONIALS TAB ==================== -->
    <div id="testimonials-tab" class="tab-content">
        <div class="form-section">
            <h2 id="testimonialsFormTitle">Add New Testimonial</h2>
            <input type="hidden" id="testimonialId">
            <input type="text" id="testimonial_name_en" placeholder="Name (English)">
            <input type="text" id="testimonial_name_ar" placeholder="Name (Arabic)">
            <input type="text" id="testimonial_title_en" placeholder="Title (English)">
            <input type="text" id="testimonial_title_ar" placeholder="Title (Arabic)">
            <textarea id="testimonial_text_en" placeholder="Testimonial (English)" rows="2"></textarea>
            <textarea id="testimonial_text_ar" placeholder="Testimonial (Arabic)" rows="2"></textarea>
            <input type="number" id="testimonial_rating" placeholder="Rating (1-5)" min="1" max="5">
            <input type="text" id="testimonial_image" placeholder="Image URL">
            <button id="testimonialSubmitBtn" class="add-btn">➕ Add Testimonial</button>
            <button id="testimonialCancelBtn" class="cancel-btn" style="display:none">Cancel</button>
        </div>
        <h2>⭐ All Testimonials</h2>
        <div id="testimonialsList"></div>
    </div>
    
    <!-- ==================== BRANCHES TAB ==================== -->
    <div id="branches-tab" class="tab-content">
        <div class="form-section">
            <h2 id="branchesFormTitle">Add New Branch</h2>
            <input type="hidden" id="branchId">
            <input type="text" id="branch_name_en" placeholder="Name (English)">
            <input type="text" id="branch_name_ar" placeholder="Name (Arabic)">
            <textarea id="branch_address_en" placeholder="Address (English)" rows="2"></textarea>
            <textarea id="branch_address_ar" placeholder="Address (Arabic)" rows="2"></textarea>
            <input type="text" id="branch_phone" placeholder="Phone Number">
            <input type="text" id="branch_whatsapp" placeholder="WhatsApp Number">
            <button id="branchSubmitBtn" class="add-btn">➕ Add Branch</button>
            <button id="branchCancelBtn" class="cancel-btn" style="display:none">Cancel</button>
        </div>
        <h2>📍 All Branches</h2>
        <div id="branchesList"></div>
    </div>

    <script>
        const API_BASE = 'https://courses-admin.kareemraafat2017.workers.dev/api';
        let currentTab = 'courses';
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                currentTab = this.getAttribute('data-tab');
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(currentTab + '-tab').classList.add('active');
                loadData(currentTab);
            });
        });
        
        // Load data for current tab
        async function loadData(type) {
            try {
                const res = await fetch(API_BASE + '/' + type);
                const data = await res.json();
                const container = document.getElementById(type + 'List');
                if (!container) return;
                
                if (data.length === 0) {
                    container.innerHTML = '<p>No data. Add your first item!</p>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < data.length; i++) {
                    const item = data[i];
                    if (type === 'courses') {
                        html += '<div class="item-card"><div class="item-info"><strong>' + (item.title_en || '') + '</strong> - $' + (item.price || 0) + '<br><small>' + (item.weeks || 0) + ' weeks</small></div><div class="actions"><button class="edit-btn" onclick="editItem(\'' + type + '\',' + item.id + ')">Edit</button><button class="delete-btn" onclick="deleteItem(\'' + type + '\',' + item.id + ')">Delete</button></div></div>';
                    } else if (type === 'instructors') {
                        html += '<div class="item-card"><div class="item-info"><strong>' + (item.name_en || '') + '</strong><br><small>' + (item.title_en || '') + '</small></div><div class="actions"><button class="edit-btn" onclick="editItem(\'' + type + '\',' + item.id + ')">Edit</button><button class="delete-btn" onclick="deleteItem(\'' + type + '\',' + item.id + ')">Delete</button></div></div>';
                    } else if (type === 'testimonials') {
                        html += '<div class="item-card"><div class="item-info"><strong>' + (item.name_en || '') + '</strong> - Rating: ' + (item.rating || 0) + '<br><small>' + (item.title_en || '') + '</small></div><div class="actions"><button class="edit-btn" onclick="editItem(\'' + type + '\',' + item.id + ')">Edit</button><button class="delete-btn" onclick="deleteItem(\'' + type + '\',' + item.id + ')">Delete</button></div></div>';
                    } else if (type === 'branches') {
                        html += '<div class="item-card"><div class="item-info"><strong>' + (item.name_en || '') + '</strong><br><small>' + (item.phone || '') + '</small></div><div class="actions"><button class="edit-btn" onclick="editItem(\'' + type + '\',' + item.id + ')">Edit</button><button class="delete-btn" onclick="deleteItem(\'' + type + '\',' + item.id + ')">Delete</button></div></div>';
                    }
                }
                container.innerHTML = html;
            } catch (err) {
                console.error('Error loading data:', err);
            }
        }
        
        // Delete item
        window.deleteItem = async function(type, id) {
            if (confirm('Delete this item?')) {
                await fetch(API_BASE + '/' + type + '/' + id, { method: 'DELETE' });
                loadData(type);
            }
        };
        
        // Edit item - simplified for now (just alert)
        window.editItem = async function(type, id) {
            alert('Edit feature coming soon! For now, delete and re-add.');
        };
        
        // Clear all data
        document.getElementById('clearBtn').onclick = async () => {
            if (confirm('⚠️ DELETE ALL DATA? This cannot be undone!')) {
                await fetch(API_BASE.replace('/api', '/clear'), { method: 'DELETE' });
                loadData(currentTab);
            }
        };
        
        // ============ COURSES SUBMIT ============
        document.getElementById('courseSubmitBtn').onclick = async () => {
            const data = {
                title_en: document.getElementById('course_title_en').value,
                title_ar: document.getElementById('course_title_ar').value,
                description_en: document.getElementById('course_description_en').value,
                description_ar: document.getElementById('course_description_ar').value,
                price: parseInt(document.getElementById('course_price').value) || 0,
                level_en: document.getElementById('course_level_en').value,
                level_ar: document.getElementById('course_level_ar').value,
                weeks: parseInt(document.getElementById('course_weeks').value) || 10,
                image: document.getElementById('course_image').value
            };
            await fetch(API_BASE + '/courses', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            document.getElementById('course_title_en').value = '';
            document.getElementById('course_title_ar').value = '';
            document.getElementById('course_description_en').value = '';
            document.getElementById('course_description_ar').value = '';
            document.getElementById('course_price').value = '';
            document.getElementById('course_weeks').value = '';
            document.getElementById('course_image').value = '';
            loadData('courses');
        };
        
        // ============ INSTRUCTORS SUBMIT ============
        document.getElementById('instructorSubmitBtn').onclick = async () => {
            const data = {
                name_en: document.getElementById('instructor_name_en').value,
                name_ar: document.getElementById('instructor_name_ar').value,
                title_en: document.getElementById('instructor_title_en').value,
                title_ar: document.getElementById('instructor_title_ar').value,
                bio_en: document.getElementById('instructor_bio_en').value,
                bio_ar: document.getElementById('instructor_bio_ar').value,
                image: document.getElementById('instructor_image').value,
                facebook: document.getElementById('instructor_facebook').value,
                instagram: document.getElementById('instructor_instagram').value,
                tiktok: document.getElementById('instructor_tiktok').value
            };
            await fetch(API_BASE + '/instructors', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            document.getElementById('instructor_name_en').value = '';
            document.getElementById('instructor_name_ar').value = '';
            document.getElementById('instructor_title_en').value = '';
            document.getElementById('instructor_title_ar').value = '';
            document.getElementById('instructor_bio_en').value = '';
            document.getElementById('instructor_bio_ar').value = '';
            document.getElementById('instructor_image').value = '';
            document.getElementById('instructor_facebook').value = '';
            document.getElementById('instructor_instagram').value = '';
            document.getElementById('instructor_tiktok').value = '';
            loadData('instructors');
        };
        
        // ============ TESTIMONIALS SUBMIT ============
        document.getElementById('testimonialSubmitBtn').onclick = async () => {
            const data = {
                name_en: document.getElementById('testimonial_name_en').value,
                name_ar: document.getElementById('testimonial_name_ar').value,
                title_en: document.getElementById('testimonial_title_en').value,
                title_ar: document.getElementById('testimonial_title_ar').value,
                text_en: document.getElementById('testimonial_text_en').value,
                text_ar: document.getElementById('testimonial_text_ar').value,
                rating: parseInt(document.getElementById('testimonial_rating').value) || 5,
                image: document.getElementById('testimonial_image').value
            };
            await fetch(API_BASE + '/testimonials', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            document.getElementById('testimonial_name_en').value = '';
            document.getElementById('testimonial_name_ar').value = '';
            document.getElementById('testimonial_title_en').value = '';
            document.getElementById('testimonial_title_ar').value = '';
            document.getElementById('testimonial_text_en').value = '';
            document.getElementById('testimonial_text_ar').value = '';
            document.getElementById('testimonial_rating').value = '';
            document.getElementById('testimonial_image').value = '';
            loadData('testimonials');
        };
        
        // ============ BRANCHES SUBMIT ============
        document.getElementById('branchSubmitBtn').onclick = async () => {
            const data = {
                name_en: document.getElementById('branch_name_en').value,
                name_ar: document.getElementById('branch_name_ar').value,
                address_en: document.getElementById('branch_address_en').value,
                address_ar: document.getElementById('branch_address_ar').value,
                phone: document.getElementById('branch_phone').value,
                whatsapp: document.getElementById('branch_whatsapp').value
            };
            await fetch(API_BASE + '/branches', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            document.getElementById('branch_name_en').value = '';
            document.getElementById('branch_name_ar').value = '';
            document.getElementById('branch_address_en').value = '';
            document.getElementById('branch_address_ar').value = '';
            document.getElementById('branch_phone').value = '';
            document.getElementById('branch_whatsapp').value = '';
            loadData('branches');
        };
        
        // Initialize
        loadData('courses');
    </script>
</body>
</html>
